<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC Poster Generator</title>

<style>
body {
  font-family: Arial;
  background: #ddd;
  text-align: center;
}

.container {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 10px;
  border-radius: 12px;
}

input, button {
  width: 95%;
  padding: 10px;
  margin: 5px;
}

canvas {
  margin-top: 10px;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="container">
<h3>🔥 SSC Poster Generator</h3>

<input id="title" placeholder="Enter Title (SSC GD Admit Card 2026 Out)">

<input type="file" id="logo">

<button onclick="generate()">Generate Poster</button>

<canvas id="canvas" width="400" height="650"></canvas>

<button onclick="download()">Download</button>

</div>

<script>

function generate(){
let title = document.getElementById("title").value;
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

// background
ctx.fillStyle = "#1976d2";
ctx.fillRect(0,0,400,650);

// header
ctx.fillStyle = "#0d47a1";
ctx.fillRect(0,0,400,70);

// title
ctx.fillStyle = "white";
ctx.font = "bold 20px Arial";
wrapText(ctx, title, 20, 40, 360, 22);

// highlight strip
ctx.fillStyle = "yellow";
ctx.fillRect(0,70,400,40);

ctx.fillStyle = "black";
ctx.font = "bold 16px Arial";
ctx.fillText("SSC GD Admit Card 2026 OUT NOW", 20, 95);

// IMPORTANT BOX
ctx.fillStyle = "white";
ctx.fillRect(10,130,380,140);

ctx.fillStyle = "red";
ctx.font = "bold 16px Arial";
ctx.fillText("IMPORTANT UPDATES", 20, 155);

ctx.fillStyle = "black";
ctx.font = "14px Arial";
ctx.fillText("✔ Admit Card Released", 20, 185);
ctx.fillText("✔ Check Official Website", 20, 210);

// STEPS BOX
ctx.fillStyle = "white";
ctx.fillRect(10,290,380,170);

ctx.fillStyle = "#0d47a1";
ctx.font = "bold 16px Arial";
ctx.fillText("HOW TO DOWNLOAD?", 20, 315);

ctx.fillStyle = "black";
ctx.font = "14px Arial";
ctx.fillText("1. Visit Official Website", 20, 345);
ctx.fillText("2. Click Admit Card", 20, 370);
ctx.fillText("3. Enter Details", 20, 395);
ctx.fillText("4. Download & Print", 20, 420);

// WARNING BOX
ctx.fillStyle = "#ffcc00";
ctx.fillRect(10,480,380,100);

ctx.fillStyle = "black";
ctx.font = "bold 14px Arial";
ctx.fillText("⚠ Without Admit Card Entry Not Allowed", 20, 530);

// LOGO
let file = document.getElementById("logo").files[0];
if(file){
  let img = new Image();
  img.onload = ()=>{
    ctx.drawImage(img, 300, 5, 80, 60);
  }
  img.src = URL.createObjectURL(file);
}
}

// wrap text
function wrapText(ctx, text, x, y, maxWidth, lineHeight){
let words = text.split(' ');
let line = '';

for(let n=0; n<words.length; n++){
  let testLine = line + words[n] + ' ';
  let width = ctx.measureText(testLine).width;

  if(width > maxWidth && n > 0){
    ctx.fillText(line, x, y);
    line = words[n] + ' ';
    y += lineHeight;
  } else {
    line = testLine;
  }
}
ctx.fillText(line, x, y);
}

// download
function download(){
let link = document.createElement('a');
link.download = "ssc-poster.png";
link.href = document.getElementById("canvas").toDataURL();
link.click();
}

</script>

</body>
</html>
